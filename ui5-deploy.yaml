# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: sodexo.corep003
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: DSE_100_Client
          url: http://dseci.sap.eu.sodexonet.com:21
          client: '100'
        app:
          name: ZFCO_REP003
          description: Geographical Site Overview
          package: ZFCO_REP003
          transport: DSEK900301
        exclude:
          - /test/
          - /localService/
